<!DOCTYPE html>
<html lang="en" data-density="balanced">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Daily Brief</title>
<meta name="theme-color" content="#f7f4ec">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Brief">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Archivo:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ---------- TOKENS (light · Pine · balanced) ---------- */
:root{
  --accent:#3f5d4a;
  --paper:#f7f4ec; --paper-raise:#fffdf9; --paper-sink:#efeadd;
  --ink:#322d26; --ink-2:#4c453a; --ink-soft:#7d7464;
  --rule:#e4ddcd; --rule-strong:#d6ccb7;
  --accent-tint:color-mix(in oklab, var(--accent) 8%, var(--paper));
  --accent-line:color-mix(in oklab, var(--accent) 38%, var(--rule));
  --shadow:0 1px 2px rgba(60,50,30,.05), 0 14px 36px -22px rgba(60,45,25,.35);
  --measure:664px; --fs-body:1.06rem; --gap-item:20px; --gap-sec:46px;
}
*{box-sizing:border-box;}
html{ -webkit-text-size-adjust:100%; }
body{ margin:0; background:var(--paper); color:var(--ink-2);
  font-family:"Newsreader",Georgia,serif; line-height:1.62;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
a{ color:inherit; }
::selection{ background:var(--accent-tint); }

/* ---------- TOP BAR (issue navigation) ---------- */
.topbar{ position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between;
  gap:14px; padding:10px max(16px, calc((100% - 1000px)/2));
  background:color-mix(in oklab, var(--paper) 84%, transparent);
  -webkit-backdrop-filter:saturate(150%) blur(14px); backdrop-filter:saturate(150%) blur(14px);
  border-bottom:1px solid var(--rule); font-family:"Archivo",system-ui,sans-serif; }
.topbar .wordmark{ font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft); }
.topbar .wordmark b{ color:var(--ink); font-weight:700; }
.issnav{ display:flex; align-items:center; gap:6px; }
.issnav button{ appearance:none; border:1px solid var(--rule); background:var(--paper-raise); color:var(--ink-soft);
  width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:15px; line-height:1;
  display:flex; align-items:center; justify-content:center; transition:.15s; }
.issnav button:hover:not(:disabled){ color:var(--accent); border-color:var(--accent-line); }
.issnav button:disabled{ opacity:.32; cursor:default; }
.issnav .lbl{ font-size:12px; color:var(--ink); min-width:104px; text-align:center; letter-spacing:.02em; }

/* ---------- PAGE ---------- */
.page{ max-width:var(--measure); margin:0 auto; padding:clamp(30px,5vw,56px) 20px calc(env(safe-area-inset-bottom) + 80px); }

/* masthead — centred newspaper */
.masthead{ text-align:center; border-bottom:3px double var(--accent-line); padding-bottom:18px; margin-bottom:28px; }
.mh-kicker{ font-family:"Archivo",sans-serif; font-size:11px; letter-spacing:.36em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
.mh-title{ font-weight:600; color:var(--ink); margin:0; line-height:1; font-size:clamp(40px,8.5vw,62px); letter-spacing:.01em; }
.mh-meta{ font-family:"Archivo",sans-serif; color:var(--ink-soft); display:flex; align-items:center; justify-content:center; gap:12px; margin-top:16px; padding-top:14px; border-top:1px double var(--accent-line); }
.mh-date{ font-size:12.5px; letter-spacing:.04em; color:var(--ink); }
.mh-meta .sep{ width:3px; height:3px; border-radius:50%; background:var(--rule-strong); }
.mh-no{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-soft); }

/* contents strip */
.contents{ font-family:"Archivo",sans-serif; font-size:11.5px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--ink-soft); display:flex; flex-wrap:wrap; gap:9px 14px; align-items:center; justify-content:center; margin:0 0 32px; }
.contents .c-i{ display:inline-flex; align-items:baseline; gap:6px; white-space:nowrap; }
.contents .c-i b{ color:var(--accent); font-weight:700; font-family:"Newsreader",serif; font-size:14px; letter-spacing:0; }
.contents .dot{ width:3px; height:3px; border-radius:50%; background:var(--rule-strong); }

.lede{ color:var(--ink); font-size:1.22rem; line-height:1.56; font-style:italic; margin:0;
  text-align:left; border-left:2px solid var(--accent); padding-left:18px; }

/* sections */
.sec{ margin-top:var(--gap-sec); }
.sec-head{ display:flex; align-items:center; gap:14px; margin-bottom:22px; }
.sec-name{ font-family:"Archivo",sans-serif; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); font-size:12.5px; margin:0; white-space:nowrap; }
.sec-rule{ flex:1; height:1px; background:var(--rule-strong); }

/* text item — News / Read / Wildcard all render identically */
.items{ display:flex; flex-direction:column; }
.item{ padding-bottom:var(--gap-item); margin-bottom:var(--gap-item); border-bottom:1px solid var(--rule); }
.item:last-child{ border-bottom:0; margin-bottom:0; padding-bottom:0; }
.kicker{ font-family:"Archivo",sans-serif; font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:7px; }
.headline{ display:block; color:var(--ink); font-weight:600; font-size:1.42rem; line-height:1.26; text-decoration:none; letter-spacing:-.005em; transition:color .15s; }
.headline:hover{ color:var(--accent); }
.note{ margin:9px 0 0; color:var(--ink-2); font-size:var(--fs-body); line-height:1.6; }
.read-badge{ display:inline-flex; align-items:center; gap:6px; margin-top:11px; color:var(--ink-soft); }
.read-badge .clock{ width:11px; height:11px; opacity:.8; }
.badge{ font-family:"Archivo",sans-serif; font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; }

/* watch */
.watch-group{ margin-bottom:30px; }
.watch-group:last-child{ margin-bottom:0; }
.group-label{ font-style:italic; color:var(--ink-soft); font-size:1.04rem; margin:0 0 14px; }
.cards{ display:flex; flex-direction:column; gap:6px; }
.card{ display:flex; gap:17px; align-items:flex-start; text-decoration:none; color:inherit; padding:11px; margin:0 -11px; border-radius:12px; transition:background .16s; }
.card:hover{ background:var(--paper-sink); }
.thumb{ position:relative; flex:0 0 178px; width:178px; aspect-ratio:16/9; border-radius:9px; overflow:hidden; background:var(--rule); box-shadow:var(--shadow); }
.thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
.thumb .dur{ position:absolute; right:7px; bottom:7px; background:rgba(20,16,12,.82); color:#f5efe2; font-family:"Archivo",sans-serif; font-size:10.5px; font-weight:600; padding:2px 7px; border-radius:5px; letter-spacing:.04em; }
.card-body h3{ margin:0; font-size:1.12rem; line-height:1.3; font-weight:600; color:var(--ink); }
.card:hover .card-body h3{ color:var(--accent); }
.card-body .note{ margin:6px 0 0; font-size:1rem; }

/* footer */
.foot{ margin-top:64px; padding-top:24px; border-top:1px solid var(--rule); text-align:center; }
.foot .signoff{ font-style:italic; color:var(--ink-soft); font-size:1.06rem; line-height:1.55; max-width:520px; margin:0 auto 16px; }
.foot .colophon{ font-family:"Archivo",sans-serif; font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-soft); }
.empty{ text-align:center; color:var(--ink-soft); font-style:italic; padding:80px 0; }

/* in-app reader */
.meta-row{ display:flex; gap:14px; align-items:center; margin-top:11px; flex-wrap:wrap; }
.meta-row .read-badge{ margin-top:0; }
.reader-tag{ font-family:"Archivo",sans-serif; font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); display:inline-flex; align-items:center; gap:5px; }
.reader-tag::before{ content:""; width:6px; height:6px; border-radius:50%; background:var(--accent); }
.headline.has-reader{ cursor:pointer; }
.reader{ position:fixed; inset:0; z-index:60; background:var(--paper); overflow-y:auto; display:none; -webkit-overflow-scrolling:touch; }
.reader.open{ display:block; }
.reader-bar{ position:sticky; top:0; display:flex; justify-content:space-between; align-items:center; gap:12px;
  padding:11px max(16px, calc((100% - 720px)/2)); background:color-mix(in oklab, var(--paper) 86%, transparent);
  -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px); border-bottom:1px solid var(--rule);
  font-family:"Archivo",sans-serif; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); }
.reader-bar a{ color:var(--accent); text-decoration:none; }
.reader-bar .r-right{ display:flex; align-items:center; gap:14px; }
.reader-bar button{ appearance:none; border:1px solid var(--rule); background:var(--paper-raise); color:var(--ink-soft);
  width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:15px; line-height:1; }
.reader-bar button:hover{ color:var(--accent); border-color:var(--accent-line); }
.reader-art{ max-width:680px; margin:0 auto; padding:30px 20px calc(env(safe-area-inset-bottom) + 90px); }
.reader-art .r-src{ font-family:"Archivo",sans-serif; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
.reader-art h1{ font-weight:600; font-size:clamp(28px,5vw,2.1rem); line-height:1.16; margin:0 0 12px; color:var(--ink); letter-spacing:-.01em; }
.reader-art .r-byline{ font-style:italic; color:var(--ink-soft); margin:0 0 28px; }
.reader-art .r-body{ font-size:1.18rem; line-height:1.72; color:var(--ink-2); }
.reader-art .r-body p{ margin:0 0 1.1em; }
.reader-art .r-body h3{ font-family:"Archivo",sans-serif; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin:1.9em 0 .7em; }
.reader-art .r-body blockquote{ margin:1.3em 0; padding-left:18px; border-left:3px solid var(--accent); font-style:italic; color:var(--ink); }
.reader-art .r-foot{ margin-top:36px; padding-top:18px; border-top:1px solid var(--rule); font-family:"Archivo",sans-serif; font-size:12px; color:var(--ink-soft); }
.reader-art .r-foot a{ color:var(--accent); }

/* Português do dia */
.pt-card{ background:var(--paper-raise); border:1px solid var(--rule); border-radius:14px; padding:18px 20px; }
.pt-head{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.pt-title{ font-weight:600; font-size:1.3rem; color:var(--ink); margin:0; }
.pt-level{ font-family:"Archivo",sans-serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); }
.pt-controls{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:14px 0 4px; }
.pt-btn{ appearance:none; border:1px solid var(--accent-line); background:var(--accent); color:#fff; font-family:"Archivo",sans-serif; font-size:13px; font-weight:600; letter-spacing:.02em; padding:9px 16px; border-radius:9px; cursor:pointer; }
.pt-btn.secondary{ background:var(--paper); color:var(--accent); }
.pt-btn:disabled{ opacity:.5; cursor:default; }
.pt-status{ font-family:"Archivo",sans-serif; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); }
.pt-status b{ color:var(--accent); }
.pt-toggle{ font-family:"Archivo",sans-serif; font-size:12px; color:var(--accent); background:none; border:0; cursor:pointer; padding:6px 0; margin-top:6px; }
.pt-transcript{ display:none; margin-top:12px; }
.pt-transcript.open{ display:block; }
.pt-transcript h4{ font-family:"Archivo",sans-serif; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin:16px 0 8px; }
.pt-transcript p{ margin:0 0 .8em; line-height:1.6; }
.pt-transcript .en{ color:var(--ink-soft); }
.pt-foot{ font-family:"Archivo",sans-serif; font-size:12px; color:var(--ink-soft); margin-top:14px; padding-top:12px; border-top:1px solid var(--rule); }
.pt-foot a{ color:var(--accent); }

@media (max-width:540px){
  .card{ gap:11px; }
  .thumb{ flex-basis:128px; width:128px; }
  .topbar .wordmark{ display:none; }
  .topbar{ justify-content:flex-end; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="wordmark"><b>The Daily Brief</b></span>
  <div class="issnav">
    <button id="prev" aria-label="Back a day (older)">‹</button>
    <span class="lbl" id="isslbl">—</span>
    <button id="next" aria-label="Forward a day (newer)">›</button>
  </div>
</div>

<div class="page"><main id="content"></main></div>

<script src="briefs.js"></script>
<script>
(function(){
  var BRIEFS = (window.BRIEFS || []);
  var content = document.getElementById('content');
  var issueIndex = 0; // 0 = newest

  function el(tag, cls, html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
  function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  var SRC_MAP = {
    'abc.net.au':'ABC News','theguardian.com':'The Guardian','theconversation.com':'The Conversation',
    'youtube.com':'YouTube','youtu.be':'YouTube','aljazeera.com':'Al Jazeera','bbc.com':'BBC','bbc.co.uk':'BBC',
    'reuters.com':'Reuters','apnews.com':'AP','dw.com':'DW','crikey.com.au':'Crikey','michaelwest.com.au':'Michael West',
    'thesaturdaypaper.com.au':'The Saturday Paper','themonthly.com.au':'The Monthly','smh.com.au':'Sydney Morning Herald','theage.com.au':'The Age'
  };
  function source(url){
    try{
      var h = new URL(url).hostname.replace(/^www\./,'');
      if(SRC_MAP[h]) return SRC_MAP[h];
      var p = h.split('.'); var base = p.length>2 ? p[p.length-2] : p[0];
      return base.charAt(0).toUpperCase()+base.slice(1);
    }catch(e){ return ''; }
  }
  var CLOCK = '<svg class="clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';
  function readBadge(dur){
    if(!dur) return null;
    var label = dur.replace(/^~\s*/,'');
    if(/\bmin\b/.test(label) && !/read/.test(label)) label = label.replace(/\bmin\b/, 'min read');
    var b = el('div','read-badge'); b.innerHTML = CLOCK + '<span class="badge">'+esc(label)+'</span>';
    return b;
  }

  // text item: source label + headline + note + reading-time badge (News, Read, Wildcard)
  function textItem(it){
    var d = el('div','item');
    var src = source(it.url);
    if(src) d.appendChild(el('div','kicker', esc(src)));
    // every text item opens in the in-app reader — never a hard redirect
    var a = el('a','headline has-reader', esc(it.title)); a.href=it.url; a.target='_blank'; a.rel='noopener';
    a.addEventListener('click', function(ev){ ev.preventDefault(); openReader(it); });
    d.appendChild(a);
    if(it.note) d.appendChild(el('p','note', esc(it.note)));
    var rb = readBadge(it.duration);
    var row = el('div','meta-row');
    if(rb) row.appendChild(rb);
    var full = it.articleId && !it.partial;
    row.appendChild(el('span','reader-tag', full ? 'Read here' : 'Summary'));
    d.appendChild(row);
    return d;
  }

  // ---- in-app reader (Creative-Commons full text) ----
  var readerEl = null, lastReaderItem = null;
  function ensureReader(){
    if(readerEl) return readerEl;
    readerEl = el('div','reader');
    readerEl.innerHTML = '<div class="reader-bar"><span>Reader</span>'+
      '<span class="r-right"><a id="r-orig" target="_blank" rel="noopener">View original ↗</a>'+
      '<button id="r-close" aria-label="Close reader">✕</button></span></div>'+
      '<article class="reader-art" id="r-art"></article>';
    document.body.appendChild(readerEl);
    readerEl.querySelector('#r-close').addEventListener('click', closeReader);
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeReader(); });
    return readerEl;
  }
  function renderReader(a){
    ensureReader();
    readerEl.querySelector('#r-orig').href = a.url || '#';
    var art = readerEl.querySelector('#r-art'); art.innerHTML='';
    art.appendChild(el('div','r-src', esc((a.source||'') + (a.partial ? ' · Summary' : (a.license ? ' · '+a.license : '')))));
    art.appendChild(el('h1', null, esc(a.title||'')));
    if(a.byline) art.appendChild(el('p','r-byline', esc(a.byline)));
    var body = el('div','r-body');
    if(a.body){ body.innerHTML = a.body; }
    else if(a.paragraphs){ a.paragraphs.forEach(function(p){ body.appendChild(el('p',null,esc(p))); }); }
    art.appendChild(body);
    var foot = el('div','r-foot');
    if(a.partial){
      foot.innerHTML = 'Short summary, in our words. Read the full article at <a href="'+esc(a.url||'#')+'" target="_blank" rel="noopener">'+esc(a.source||'the source')+' ↗</a>.';
    } else {
      foot.innerHTML = 'Republished from <a href="'+esc(a.url||'#')+'" target="_blank" rel="noopener">'+esc(a.source||'the original')+'</a>'+(a.license?(' under '+esc(a.license)):'')+'.';
    }
    art.appendChild(foot);
    readerEl.classList.add('open'); readerEl.scrollTop=0; document.body.style.overflow='hidden';
  }
  function closeReader(){ if(readerEl){ readerEl.classList.remove('open'); document.body.style.overflow=''; } }

  // mobile swipe: right = back to the brief (close reader); left on the brief = reopen last article
  (function(){
    var x0=null, y0=null;
    document.addEventListener('touchstart', function(e){ var t=e.changedTouches[0]; x0=t.clientX; y0=t.clientY; }, {passive:true});
    document.addEventListener('touchend', function(e){
      if(x0===null) return;
      var t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0; x0=null;
      if(Math.abs(dx) < 70 || Math.abs(dx) < Math.abs(dy)*1.5) return; // ignore taps/vertical scrolls
      var open = readerEl && readerEl.classList.contains('open');
      if(open && dx > 0) closeReader();                                // swipe right → back
      else if(!open && dx < 0 && lastReaderItem) openReader(lastReaderItem); // swipe left → forward
    }, {passive:true});
  })();
  function readerFromItem(it){
    return { title: it.title, source: source(it.url), url: it.url, partial: true,
             body: it.note ? ('<p>'+esc(it.note)+'</p>') : '' };
  }
  function openReader(it){
    window.__DB_ARTICLES = window.__DB_ARTICLES || {};
    lastReaderItem = it;
    var id = it.articleId;
    if(id && window.__DB_ARTICLES[id]){ renderReader(window.__DB_ARTICLES[id]); return; }
    // open in-app IMMEDIATELY from the item's own data — never bounce to an external app
    renderReader(readerFromItem(it));
    if(id){
      var s = document.createElement('script'); s.src = 'articles/'+id+'.js';
      s.onload = function(){ if(window.__DB_ARTICLES[id]) renderReader(window.__DB_ARTICLES[id]); };
      s.onerror = function(){ /* keep the in-app fallback; do NOT redirect */ };
      document.head.appendChild(s);
    }
  }
  function card(it){
    var a = el('a','card'); a.href=it.url; a.target='_blank'; a.rel='noopener';
    if(it.thumb){
      var t = el('div','thumb');
      var img = el('img'); img.loading='lazy'; img.src=it.thumb; img.alt='';
      img.onerror=function(){ t.style.background='var(--paper-sink)'; img.remove(); };
      t.appendChild(img);
      if(it.duration) t.appendChild(el('span','dur', esc(it.duration)));
      a.appendChild(t);
    }
    var b = el('div','card-body');
    b.appendChild(el('h3', null, esc(it.title)));
    if(it.note) b.appendChild(el('p','note', esc(it.note)));
    a.appendChild(b);
    return a;
  }

  function renderSection(sec){
    var isWatch = /watch/i.test(sec.name);
    var s = el('section','sec');
    var head = el('div','sec-head');
    head.appendChild(el('h2','sec-name', esc(sec.name)));
    head.appendChild(el('span','sec-rule'));
    s.appendChild(head);
    if(sec.groups && sec.groups.length){
      sec.groups.forEach(function(g){
        var gd = el('div','watch-group');
        if(g.label) gd.appendChild(el('div','group-label', esc(g.label)));
        var holder = el('div', isWatch ? 'cards' : 'items');
        g.items.forEach(function(it){ holder.appendChild((isWatch || it.thumb) ? card(it) : textItem(it)); });
        gd.appendChild(holder);
        s.appendChild(gd);
      });
    } else {
      var wrap = el('div','items');
      (sec.items||[]).forEach(function(it){ wrap.appendChild((isWatch || it.thumb) ? card(it) : textItem(it)); });
      s.appendChild(wrap);
    }
    return s;
  }

  function countItems(sec){ if(sec.groups&&sec.groups.length){ var n=0; sec.groups.forEach(function(g){ n+=(g.items||[]).length; }); return n; } return (sec.items||[]).length; }
  function contentsStrip(brief){
    var parts = [];
    (brief.sections||[]).forEach(function(sec){
      var n, label;
      if(/watch/i.test(sec.name)){ n=countItems(sec); label='to watch'; }
      else { n=countItems(sec);
        if(/news/i.test(sec.name)) label = n===1?'headline':'headlines';
        else if(/read/i.test(sec.name)) label = n===1?'long read':'long reads';
        else label = sec.name.toLowerCase(); }
      if(n>0) parts.push({n:n,label:label});
    });
    var c = el('div','contents');
    parts.forEach(function(p,i){ if(i) c.appendChild(el('span','dot')); c.appendChild(el('span','c-i','<b>'+p.n+'</b> '+esc(p.label))); });
    return c;
  }

  // ---- Português do dia (browser TTS: PT → EN → PT, with read-along transcript) ----
  var ptStop = null;
  function pickVoice(pref){
    var vs = (window.speechSynthesis && speechSynthesis.getVoices) ? speechSynthesis.getVoices() : [];
    function by(test){ for(var i=0;i<vs.length;i++){ if(test(vs[i])) return vs[i]; } return null; }
    if(pref==='pt') return by(function(v){return /pt[-_]BR/i.test(v.lang);}) || by(function(v){return /Luciana|Joana|Brazil|Brasil/i.test(v.name);}) || by(function(v){return /^pt/i.test(v.lang);});
    return by(function(v){return /en[-_](US|GB|AU)/i.test(v.lang);}) || by(function(v){return /^en/i.test(v.lang);});
  }
  function speakSequence(lesson, statusEl, playBtn){
    if(!('speechSynthesis' in window)){ statusEl.textContent = 'Speech not supported here'; return; }
    speechSynthesis.cancel();
    var ptV = pickVoice('pt'), enV = pickVoice('en'), stopped = false, i = 0;
    var passes = [['Portuguese', lesson.pt, 'pt-BR', ptV, 0.95],
                  ['English', lesson.en, 'en-US', enV, 1.0],
                  ['Portuguese — again', lesson.pt, 'pt-BR', ptV, 0.95]];
    var q = [];
    passes.forEach(function(p){ p[1].forEach(function(para){ q.push({label:p[0], text:para, lang:p[2], voice:p[3], rate:p[4]}); }); });
    ptStop = function(){ stopped = true; speechSynthesis.cancel(); statusEl.innerHTML=''; playBtn.disabled=false; ptStop=null; };
    function next(){
      if(stopped) return;
      if(i>=q.length){ statusEl.innerHTML='<b>Done</b>'; playBtn.disabled=false; ptStop=null; return; }
      var it = q[i++];
      statusEl.innerHTML = 'Now: <b>'+esc(it.label)+'</b>';
      var u = new SpeechSynthesisUtterance(it.text);
      u.lang = it.lang; if(it.voice) u.voice = it.voice; u.rate = it.rate;
      u.onend = next; u.onerror = next;
      speechSynthesis.speak(u);
    }
    playBtn.disabled = true; next();
  }
  function renderPortuguese(id){
    var s = el('section','sec');
    var head = el('div','sec-head');
    head.appendChild(el('h2','sec-name','Português do dia'));
    head.appendChild(el('span','sec-rule'));
    s.appendChild(head);
    var card = el('div','pt-card');
    card.innerHTML = '<div class="pt-head"><h3 class="pt-title">…</h3><span class="pt-level"></span></div>';
    s.appendChild(card);
    function build(L){
      card.querySelector('.pt-title').textContent = L.title || 'História do dia';
      card.querySelector('.pt-level').textContent = L.level || '';
      var controls = el('div','pt-controls');
      var play = el('button','pt-btn','▶  Ouvir (PT → EN → PT)');
      var stop = el('button','pt-btn secondary','Stop');
      var status = el('span','pt-status','');
      controls.appendChild(play); controls.appendChild(stop); controls.appendChild(status);
      card.appendChild(controls);
      play.addEventListener('click', function(){ speakSequence(L, status, play); });
      stop.addEventListener('click', function(){ if(ptStop) ptStop(); });
      var toggle = el('button','pt-toggle','Show transcript ▾');
      var tr = el('div','pt-transcript');
      tr.appendChild(el('h4',null,'Português'));
      (L.pt||[]).forEach(function(p){ tr.appendChild(el('p',null,esc(p))); });
      tr.appendChild(el('h4',null,'English'));
      (L.en||[]).forEach(function(p){ tr.appendChild(el('p','en',esc(p))); });
      toggle.addEventListener('click', function(){ tr.classList.toggle('open'); toggle.textContent = tr.classList.contains('open') ? 'Hide transcript ▴' : 'Show transcript ▾'; });
      card.appendChild(toggle); card.appendChild(tr);
      var foot = el('div','pt-foot');
      foot.innerHTML = 'Prefer a human voice? Today\'s <a href="https://www.iheart.com/podcast/53-fluent-fiction-portuguese-b-181223870/" target="_blank" rel="noopener">Fluent Fiction — Portuguese (Brazil) ↗</a> — free, daily, on every podcast app.';
      card.appendChild(foot);
    }
    window.__DB_PT = window.__DB_PT || {};
    if(window.__DB_PT[id]){ build(window.__DB_PT[id]); }
    else {
      var sc = document.createElement('script'); sc.src = 'lessons/'+id+'.js';
      sc.onload = function(){ if(window.__DB_PT[id]) build(window.__DB_PT[id]); else card.querySelector('.pt-title').textContent='Lesson unavailable'; };
      sc.onerror = function(){ card.querySelector('.pt-title').textContent='Lesson unavailable'; };
      document.head.appendChild(sc);
    }
    return s;
  }

  function masthead(brief){
    var no = BRIEFS.length - issueIndex; // oldest = No.1, increments over time
    var h = el('header','masthead');
    h.innerHTML =
      '<div class="mh-kicker">Curated · Yarra Ranges</div>'+
      '<h1 class="mh-title">The Daily Brief</h1>'+
      '<div class="mh-meta"><span class="mh-date">'+esc(brief.weekday_date||brief.date)+'</span>'+
      '<span class="sep"></span><span class="mh-no">No. '+no+'</span></div>';
    return h;
  }

  function render(){
    var brief = BRIEFS[issueIndex];
    if(window.speechSynthesis) speechSynthesis.cancel();
    content.innerHTML='';
    if(!brief){ content.appendChild(el('div','empty','No briefs yet.')); return; }
    content.appendChild(masthead(brief));
    if(brief.intro) content.appendChild(el('p','lede', esc(brief.intro)));
    content.appendChild(contentsStrip(brief));
    (brief.sections||[]).forEach(function(sec){ content.appendChild(renderSection(sec)); });
    if(brief.portugueseId) content.appendChild(renderPortuguese(brief.portugueseId));
    var so=(brief.signoff||'').replace(/^\*+|\*+$/g,'').trim();
    var no = BRIEFS.length - issueIndex;
    var f = el('footer','foot');
    if(so) f.appendChild(el('div','signoff', '“'+esc(so)+'”'));
    f.appendChild(el('div','colophon','The Daily Brief · No. '+no+' · '+esc(brief.weekday_date||brief.date)));
    content.appendChild(f);
  }

  // issue nav — left = back a day (older), right = forward a day (newer)
  function updateNav(){
    var b = BRIEFS[issueIndex];
    var wd = ((b && (b.weekday_date||b.date))||'').split(',')[0];
    document.getElementById('isslbl').textContent = wd || '—';
    document.getElementById('prev').disabled = issueIndex >= BRIEFS.length-1; // no older
    document.getElementById('next').disabled = issueIndex <= 0;               // no newer
  }
  function go(i){ issueIndex = Math.max(0, Math.min(BRIEFS.length-1, i)); updateNav(); render(); window.scrollTo(0,0); }
  document.getElementById('prev').addEventListener('click', function(){ go(issueIndex+1); }); // older
  document.getElementById('next').addEventListener('click', function(){ go(issueIndex-1); }); // newer

  go(0);

  if('serviceWorker' in navigator && location.protocol==='https:'){
    // never serve sw.js itself from cache; check for a new worker on every load
    navigator.serviceWorker.register('sw.js', {updateViaCache:'none'})
      .then(function(reg){ reg.update(); }).catch(function(){});
    // when a new worker takes control, reload once so the page shows fresh content
    var __reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if(__reloaded) return; __reloaded = true; location.reload();
    });
  }
})();
</script>
